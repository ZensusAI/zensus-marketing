<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0c;
        --fg: #f7f5f2;
        --muted: #8b8b93;
        --border: #22242c;
        --accent: #22c55e;
        --accent-plaid: #f7f5f2;
        --accent-quickbooks: #2ca01c;
        --accent-hubspot: #ff7a59;
        --accent-slack: #e01e5a;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family:
          "Geist", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .card {
        position: relative;
        width: 1200px;
        height: 630px;
        padding: 72px 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
        background:
          radial-gradient(
            1200px 600px at 85% 15%,
            rgba(34, 197, 94, 0.08),
            transparent 60%
          ),
          radial-gradient(
            900px 500px at 15% 90%,
            rgba(34, 197, 94, 0.04),
            transparent 60%
          ),
          var(--bg);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.03) 1px,
            transparent 1px
          );
        background-size: 40px 40px;
        pointer-events: none;
      }

      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        border: 1px solid var(--border);
        pointer-events: none;
      }

      .wordmark {
        position: relative;
        display: flex;
        align-items: center;
        gap: 14px;
        z-index: 1;
      }

      .wordmark img {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        display: block;
      }

      .wordmark span {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--fg);
      }

      .body {
        position: relative;
        z-index: 1;
        max-width: 940px;
        display: flex;
        flex-direction: column;
        gap: 26px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: "Geist Mono", ui-monospace, SFMono-Regular, monospace;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .eyebrow .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent);
      }

      .eyebrow[data-empty="true"] {
        display: none;
      }

      .title {
        font-size: 76px;
        line-height: 1.04;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--fg);
      }

      .subtitle {
        font-size: 28px;
        line-height: 1.4;
        font-weight: 400;
        color: var(--muted);
        max-width: 880px;
      }

      .footer {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
      }

      .url {
        font-family: "Geist Mono", ui-monospace, SFMono-Regular, monospace;
        font-size: 20px;
        font-weight: 500;
        color: var(--muted);
      }

      .mark {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: "Geist Mono", ui-monospace, SFMono-Regular, monospace;
        font-size: 14px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .chart {
        width: 96px;
        height: 28px;
      }

      /* Accent variants: reroute --accent for brand-led integration cards. */
      [data-accent="plaid"] {
        --accent: var(--accent-plaid);
      }
      [data-accent="quickbooks"] {
        --accent: var(--accent-quickbooks);
      }
      [data-accent="hubspot"] {
        --accent: var(--accent-hubspot);
      }
      [data-accent="slack"] {
        --accent: var(--accent-slack);
      }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <header class="wordmark">
        <img src="/src/assets/zensus-logo.png" alt="" />
        <span>Zensus</span>
      </header>

      <section class="body">
        <div class="eyebrow" id="eyebrow">
          <span class="dot"></span>
          <span id="category"></span>
        </div>
        <h1 class="title" id="title"></h1>
        <p class="subtitle" id="subtitle"></p>
      </section>

      <footer class="footer">
        <span class="url">zensus.app</span>
        <span class="mark">
          <svg
            class="chart"
            viewBox="0 0 96 28"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M2 22 L18 18 L34 20 L50 10 L66 12 L82 4 L94 6"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          runway
        </span>
      </footer>
    </div>

    <script>
      // Read query params and populate the template. The generator script
      // navigates to /scripts/og/template.html?title=...&subtitle=...&category=...&accent=...
      const params = new URLSearchParams(window.location.search);
      const title = params.get("title") || "";
      const subtitle = params.get("subtitle") || "";
      const category = params.get("category") || "";
      const accent = params.get("accent") || "green";

      document.getElementById("title").textContent = title;
      document.getElementById("subtitle").textContent = subtitle;
      document.getElementById("category").textContent = category;

      const eyebrow = document.getElementById("eyebrow");
      if (!category) {
        eyebrow.setAttribute("data-empty", "true");
      }

      document.getElementById("card").setAttribute("data-accent", accent);
    </script>
  </body>
</html>
