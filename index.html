<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Default fallback title for non-prerendered paths. Every routed URL is prerendered with a route-specific title, description, canonical, and OpenGraph/Twitter tags via react-helmet-async. Only page-agnostic tags live here. -->
    <title>Zensus · Cash flow forecasting for founders with variable revenue</title>
    <meta name="author" content="Zensus" />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Zensus" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@zensusai" />
    <meta name="twitter:creator" content="@zensusai" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0c0f" />
    <meta name="msapplication-TileColor" content="#0a0c0f" />

    <!-- Structured Data (JSON-LD). Organization and WebSite graphs apply site-wide; SoftwareApplication describes the Zensus product. Pricing is intentionally omitted since Zensus is sales-led and plans are quoted per customer. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://zensus.app/#organization",
            "name": "Zensus",
            "url": "https://zensus.app",
            "logo": "https://zensus.app/favicon-192x192.png",
            "sameAs": [
              "https://x.com/zensusai",
              "https://www.linkedin.com/company/zensusai"
            ]
          },
          {
            "@type": "WebSite",
            "@id": "https://zensus.app/#website",
            "url": "https://zensus.app",
            "name": "Zensus",
            "description": "Cash flow forecasting for founders with variable revenue",
            "publisher": { "@id": "https://zensus.app/#organization" },
            "inLanguage": "en-US"
          },
          {
            "@type": "SoftwareApplication",
            "name": "Zensus",
            "description": "AI-powered cash flow forecasting for founders with variable revenue. Connect your bank, QuickBooks, and HubSpot, see your runway in real time, and run multi-turn scenarios with an AI agent.",
            "url": "https://zensus.app",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web",
            "publisher": { "@id": "https://zensus.app/#organization" }
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
